<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#C0D0E8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="家庭帳本">
<link rel="apple-touch-icon" id="apple-icon" href="">
<link rel="icon" id="favicon" href="">
<title>家庭帳本</title>
<script>
(function(){
  const c=document.createElement('canvas');
  c.width=512;c.height=512;
  const ctx=c.getContext('2d');
  const grad=ctx.createLinearGradient(0,0,512,512);
  grad.addColorStop(0,'#FFFBF0');
  grad.addColorStop(1,'#FFF3CC');
  ctx.fillStyle=grad;
  ctx.beginPath();
  ctx.roundRect(0,0,512,512,80);
  ctx.fill();
  ctx.font='300px serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('💰',256,276);
  const url=c.toDataURL('image/png');
  document.getElementById('apple-icon').href=url;
  document.getElementById('favicon').href=url;
})();
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bp:#FAFBFD;--bs:#EEF2F8;--bt:#E8EEF4;
  --tp:#304060;--ts:#607090;--tt:#8090A8;
  --bd:rgba(48,64,96,0.12);--bdm:rgba(48,64,96,0.22);
  --green:#5A8060;--red:#A32D2D;--purple:#98B8D8;
  --accent:#98B8D8;--accent-dark:#304060;
  --warm:#F0E0D0;--warm-dark:#6A4030;
  --rm:8px;--rl:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bp:#1e2430;--bs:#252d3a;--bt:#1a2030;
    --tp:#C8D8E8;--ts:#8098B0;--tt:#607080;
    --bd:rgba(200,216,232,0.1);--bdm:rgba(200,216,232,0.2);
  }
}
html,body{height:100%;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bt);color:var(--tp);-webkit-tap-highlight-color:transparent}
.app{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh;background:var(--bt)}
.topbar{background:#C0D0E8;border-bottom:0.5px solid var(--bd);display:flex;align-items:center;padding:0 16px;height:52px;flex-shrink:0;gap:0}
.logo-title{font-size:14px;font-weight:500;line-height:1.3;color:#304060}
.logo-sub{font-size:10px;color:var(--ts)}
.logo-block{margin-right:16px;flex-shrink:0}
.sep{width:1px;height:20px;background:var(--bd);margin:0 6px;flex-shrink:0}
.ntab{display:flex;align-items:center;gap:6px;padding:6px 11px;border-radius:var(--rm);cursor:pointer;font-size:13px;color:var(--ts);white-space:nowrap;height:36px;border:none;background:none}
.ntab:hover{background:var(--bs)}
.ntab.on{background:var(--bs);color:var(--tp);font-weight:500}
.ntab svg{opacity:0.5;flex-shrink:0}
.ntab.on svg{opacity:1}
.users{display:flex;align-items:center;gap:8px;margin-left:auto}
.av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0}
.av-a{background:#E1F5EE;color:#085041}
.av-s{background:#EEEDFE;color:#3C3489}
.uname{font-size:11px;color:var(--ts)}
.main{flex:1;overflow:hidden;position:relative}
.pg{display:none;height:100%;overflow-y:auto;padding:0 16px 40px;width:100%;box-sizing:border-box}
.pg.on{display:block}
.botbar{display:none;background:var(--bp);border-top:0.5px solid var(--bd);flex-shrink:0}
.btab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:none;padding:8px 0 10px;color:var(--tt)}
.btab.on{color:var(--tp)}
.btab-lbl{font-size:10px;font-weight:400}
.btab.on .btab-lbl{font-weight:500}
.mc{background:var(--bs);border-radius:var(--rm);padding:12px}
.lbl{font-size:11px;color:var(--ts);margin-bottom:4px}
.val{font-size:17px;font-weight:500;color:var(--tp)}
.val.g{color:var(--green)}.val.r{color:var(--red)}
.hint{font-size:10px;color:var(--tt);margin-top:2px}
.fc{background:var(--bp);border:0.5px solid var(--bd);border-radius:var(--rl);padding:14px;margin-bottom:12px}
.sec{font-size:13px;font-weight:500;color:var(--tp);margin-bottom:10px}
.hr{border:none;border-top:0.5px solid var(--bd);margin:8px 0}
.rrow{display:flex;justify-content:space-between;align-items:center;padding:4px 0}
.rl{font-size:12px;color:var(--ts);display:flex;align-items:center;gap:5px}
.rv{font-size:12px;font-weight:500;color:var(--tp)}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;display:inline-block}
.bdg{font-size:10px;padding:2px 7px;border-radius:20px;display:inline-block;margin-top:3px}
.bd1{background:#EAF0F8;color:#304060}.bd2{background:#F8EEE8;color:#6A4030}.bd3{background:#F1EFE8;color:#444441}
.sb{background:var(--bs);border-radius:var(--rm);padding:9px 11px;margin-top:6px}
.sg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:6px}
.sg2{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
.sgl{font-size:10px;color:var(--ts)}
.sgv{font-size:11px;font-weight:500;color:var(--tp);margin-top:1px}
.sgv.gp{color:var(--green)}.sgv.rp{color:var(--red)}
.pb{height:4px;background:var(--bp);border-radius:2px;overflow:hidden;margin-top:4px}
.pf{height:100%;border-radius:2px;transition:width .3s}
.ti{font-size:11px;border:0.5px solid var(--bdm);border-radius:4px;padding:2px 5px;background:var(--bp);color:var(--tp);width:100%;text-align:right}
.exl{display:grid;grid-template-columns:180px 1fr;gap:12px}
.mtabs{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:12px}
.mt{font-size:11px;padding:3px 9px;border-radius:20px;border:0.5px solid var(--bdm);cursor:pointer;color:var(--ts);background:var(--bp);white-space:nowrap}
.mt.on{background:#98B8D8;color:#fff;border-color:#98B8D8}
.mt.yr{border-color:#98B8D8;color:#304060}
.mt.yr.on{background:#98B8D8;color:#fff;border-color:#98B8D8}
.tc3{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:11px}
.tc2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:11px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.br{display:flex;align-items:center;gap:7px;margin-bottom:6px;cursor:pointer;padding:3px 5px;border-radius:5px}
.br:hover,.br:active{background:var(--bs)}
.brl{font-size:12px;color:var(--ts);width:48px;flex-shrink:0}
.brw{flex:1;height:6px;background:var(--bs);border-radius:3px;overflow:hidden}
.brf{height:100%;border-radius:3px}
.bra{font-size:11px;color:var(--tp);width:60px;text-align:right;flex-shrink:0}
.tbs{display:flex;align-items:flex-end;gap:2px;height:52px}
.tbc{flex:1;display:flex;flex-direction:column;align-items:center}
.tbb{width:100%;border-radius:2px 2px 0 0;min-height:2px}
.tbl{font-size:9px;color:var(--tt);margin-top:3px}
.tbl.on{color:var(--tp);font-weight:500}
.ffs{display:flex;gap:8px;margin-bottom:9px}
.ffc{flex:1;background:var(--bs);border-radius:var(--rm);padding:9px}
.fr{display:flex;justify-content:space-between;padding:4px 0;border-bottom:0.5px solid var(--bd)}
.fr:last-child{border-bottom:none}
.yr-badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:20px;background:#EAF0F8;color:#304060;margin-left:6px;vertical-align:middle}
.fg{margin-bottom:10px}
.fl{font-size:11px;color:var(--ts);margin-bottom:4px}
.uz{border:0.5px dashed var(--bdm);border-radius:var(--rl);padding:28px 16px;text-align:center;margin-bottom:12px;cursor:pointer}
.uz:hover,.uz:active{background:var(--bs)}
.ftg{display:flex;gap:5px;justify-content:center;margin-top:8px;flex-wrap:wrap}
.ft{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--bs);color:var(--ts)}
.air{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:0.5px solid var(--bd)}
.air:last-child{border-bottom:none}
.ain{flex:1}
.ain .n{font-size:12px;color:var(--tp)}
.ain .d{font-size:10px;color:var(--ts);margin-top:1px}
.item-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:0.5px solid var(--bd)}
.item-row:last-child{border-bottom:none}
.item-name{flex:1;font-size:13px;color:var(--tp)}
.item-owner{font-size:11px;color:var(--ts);margin-right:6px}
.item-actions{display:flex;gap:4px;flex-shrink:0}
.btn-edit{font-size:11px;padding:3px 8px;border-radius:var(--rm);border:0.5px solid var(--bdm);background:none;cursor:pointer;color:var(--ts)}
.btn-edit:hover{background:var(--bs)}
.btn-del{font-size:11px;padding:3px 8px;border-radius:var(--rm);border:0.5px solid #F09595;background:none;cursor:pointer;color:var(--red)}
.btn-del:hover{background:#FCEBEB}
.add-row{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:0.5px solid var(--bd);flex-wrap:wrap}
.add-row input,.add-row select{font-size:12px;padding:6px 8px;border:0.5px solid var(--bdm);border-radius:var(--rm);background:var(--bp);color:var(--tp)}
.add-row input{flex:1;min-width:100px}
.add-row button{font-size:12px;padding:6px 12px;white-space:nowrap}
.mtl-btn{font-size:11px;padding:4px 9px;border-radius:var(--rm);border:0.5px solid var(--bdm);background:none;cursor:pointer;color:var(--ts);margin-right:6px}
.mtl-btn.on{background:#98B8D8;color:#fff;border-color:#98B8D8}
button{border:none;border-radius:var(--rm);background:var(--accent);color:#fff;cursor:pointer;font-weight:500;transition:.2s}
button:hover{opacity:0.9}
button:active{opacity:0.85}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center}
.modal.on{display:flex}
.modal-box{background:var(--bp);border-radius:var(--rl);padding:16px;max-width:600px;max-height:80vh;overflow:auto;width:90vw}
.modal-ttl{font-size:14px;font-weight:500;color:var(--tp);margin-bottom:12px}
.modal-body{font-size:12px;color:var(--ts);line-height:1.6}
.tag{display:inline-flex;align-items:center;gap:5px;background:var(--bs);border-radius:20px;padding:4px 10px;margin:3px;font-size:12px}
.tag-del{cursor:pointer;color:var(--ts);font-weight:bold}
.tag-del:hover{color:var(--tp)}
.edit-inline{display:none;flex-gap:8px;padding:8px 0;border-bottom:0.5px solid var(--bd)}
.edit-inline.on{display:flex;gap:8px;align-items:center}
.edit-inline input,.edit-inline select{font-size:11px;padding:4px 6px;border:0.5px solid var(--bdm);border-radius:4px;background:var(--bp);color:var(--tp)}
.edit-inline input{flex:1;min-width:80px}
.edit-inline button{font-size:11px;padding:4px 8px;white-space:nowrap}
.txr{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--bd)}
.txd{width:3px;height:20px;border-radius:1.5px;flex-shrink:0}
.txi{flex:1;min-width:0}
.txn{font-size:12px;color:var(--tp);font-weight:500}
.txdt{font-size:10px;color:var(--ts);margin-top:1px}
.txa{font-size:12px;color:var(--tp);text-align:right;flex-shrink:0;font-weight:500}
.cp{width:28px;height:28px;border-radius:var(--rm);cursor:pointer;border:0.5px solid transparent;margin-right:6px}
.cp.on{border:2px solid var(--tp)}
@media(min-width:960px){
  .botbar{display:flex;position:fixed;bottom:0;left:0;right:0;border-top:0.5px solid var(--bd)}
  .app{min-height:100vh}
  .main{padding-bottom:48px}
  .pg{padding:20px 32px 40px}
  .exl{grid-template-columns:200px 1fr}
}
.bank-tab{font-size:11px;padding:8px 12px;border-radius:var(--rm);border:0.5px solid var(--bdm);cursor:pointer;color:var(--ts);background:var(--bp);white-space:nowrap}
.bank-tab.on{background:#98B8D8;color:#fff;border-color:#98B8D8}
.dist-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:8px;background:var(--bs);border-radius:6px}
.dist-name{font-size:12px;color:var(--ts);width:80px;flex-shrink:0}
.dist-input{flex:1;padding:6px 8px;border:0.5px solid var(--bdm);border-radius:4px;font-size:11px}
.dist-pct{font-size:11px;color:var(--tt);width:50px;text-align:right;flex-shrink:0}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo-block"><div class="logo-title">家庭帳本</div><div class="logo-sub">共同記帳平台</div></div>
    <div class="sep"></div>
    <button class="ntab on" onclick="showTab('dash')"><span>📊</span> 儀表板</button>
    <button class="ntab" onclick="showTab('search')"><span>🔍</span> 搜尋</button>
    <button class="ntab" onclick="showTab('record')"><span>➕</span> 記帳</button>
    <button class="ntab" onclick="showTab('settings')"><span>⚙️</span> 設定</button>
    <div class="users">
      <div class="av av-a">S</div>
      <div class="uname">Sherry</div>
      <div class="av av-s">A</div>
      <div class="uname">Allen</div>
    </div>
  </div>
  
  <div class="main">
    <!-- 儀表板 -->
    <div class="pg on" id="dash">
      <div style="padding:20px 0">
        <div class="mc">
          <div class="lbl">本月支出</div>
          <div class="val r">NT$<span id="dash-exp">0</span></div>
          <div class="hint" id="dash-hint"></div>
        </div>
      </div>
      <div class="fc">
        <div class="sec">每週趨勢</div>
        <div id="weekly-chart" style="height:120px"></div>
      </div>
      <div class="fc">
        <div class="sec">本月分類</div>
        <div id="cat-summary"></div>
      </div>
      <div class="fc">
        <div class="sec">固定/彈性</div>
        <div class="sg2">
          <div><div class="sgl">固定支出</div><div class="sgv gp">NT$<span id="fix-t">0</span></div><div class="hint" id="fix-p"></div></div>
          <div><div class="sgl">彈性支出</div><div class="sgv rp">NT$<span id="flex-t">0</span></div><div class="hint" id="flex-p"></div></div>
        </div>
        <div id="fix-items" style="margin-top:8px"></div>
      </div>
    </div>

    <!-- 搜尋 -->
    <div class="pg" id="search">
      <div style="padding:20px 0">
        <!-- 搜尋類型選擇 -->
        <div style="display:flex;gap:8px;margin-bottom:20px">
          <button class="mtl-btn on" onclick="showSearchType('banks')">帳戶明細</button>
          <button class="mtl-btn" onclick="showSearchType('transactions')">收支明細</button>
        </div>

        <!-- 帳戶明細頁面 -->
        <div id="search-banks">
          <!-- 月份切換 -->
          <div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:20px">
            <button style="background:none;border:0.5px solid var(--bd);padding:8px 12px;cursor:pointer;border-radius:var(--rm)" onclick="prevMonth()">◄</button>
            <span style="font-weight:500;min-width:140px;text-align:center;color:var(--tp)" id="current-month">2026年5月</span>
            <button style="background:none;border:0.5px solid var(--bd);padding:8px 12px;cursor:pointer;border-radius:var(--rm)" onclick="nextMonth()">►</button>
          </div>

          <!-- 帳戶標籤 -->
          <div style="display:flex;gap:8px;margin-bottom:20px;overflow-x:auto;padding-bottom:8px" id="bank-tabs"></div>

          <!-- 帳戶詳細資訊 -->
          <div class="fc">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
              <div style="background:var(--bs);padding:12px;border-radius:var(--rm)">
                <div style="font-size:11px;color:var(--ts);margin-bottom:4px">期初餘額</div>
                <div style="font-size:16px;font-weight:500;color:var(--tp)" id="bank-initial">NT$0</div>
              </div>
              <div style="background:var(--bs);padding:12px;border-radius:var(--rm)">
                <div style="font-size:11px;color:var(--ts);margin-bottom:4px">目前餘額</div>
                <div style="font-size:16px;font-weight:500;color:var(--tp)" id="bank-current">NT$0</div>
              </div>
            </div>

            <!-- 交易明細 -->
            <div style="margin-bottom:16px">
              <div style="font-size:12px;font-weight:500;color:var(--tp);margin-bottom:10px">交易明細</div>
              <div id="bank-transactions" style="border-top:0.5px solid var(--bd);padding-top:8px"></div>
            </div>

            <!-- 月份統計 -->
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
              <div style="background:var(--bs);padding:10px;border-radius:var(--rm);text-align:center">
                <div style="font-size:10px;color:var(--ts);margin-bottom:4px">本月收入</div>
                <div style="font-size:13px;font-weight:500;color:var(--green)" id="month-income">+NT$0</div>
              </div>
              <div style="background:var(--bs);padding:10px;border-radius:var(--rm);text-align:center">
                <div style="font-size:10px;color:var(--ts);margin-bottom:4px">本月支出</div>
                <div style="font-size:13px;font-weight:500;color:var(--red)" id="month-expense">-NT$0</div>
              </div>
              <div style="background:var(--bs);padding:10px;border-radius:var(--rm);text-align:center">
                <div style="font-size:10px;color:var(--ts);margin-bottom:4px">淨額變化</div>
                <div style="font-size:13px;font-weight:500;color:var(--tp)" id="month-net">NT$0</div>
              </div>
            </div>
          </div>
        </div>

        <!-- 收支明細頁面 -->
        <div id="search-transactions" style="display:none">
          <div class="fc">
            <div class="sec">搜尋收支明細</div>
            
            <div class="fg">
              <div class="fl">日期範圍</div>
              <div class="g2">
                <input type="date" id="search-date-from" style="width:100%;padding:8px;border:0.5px solid var(--bdm);border-radius:var(--rm)">
                <input type="date" id="search-date-to" style="width:100%;padding:8px;border:0.5px solid var(--bdm);border-radius:var(--rm)">
              </div>
            </div>

            <div class="g2">
              <div class="fg">
                <div class="fl">支付管道</div>
                <select id="search-channel" style="width:100%;padding:8px;border:0.5px solid var(--bdm);border-radius:var(--rm)">
                  <option value="">全部</option>
                </select>
              </div>
              <div class="fg">
                <div class="fl">費用類別</div>
                <select id="search-category" style="width:100%;padding:8px;border:0.5px solid var(--bdm);border-radius:var(--rm)">
                  <option value="">全部</option>
                </select>
              </div>
            </div>

            <div class="g2">
              <div class="fg">
                <div class="fl">記帳人</div>
                <select id="search-user" style="width:100%;padding:8px;border:0.5px solid var(--bdm);border-radius:var(--rm)">
                  <option value="">全部</option>
                  <option>Sherry</option>
                  <option>Allen</option>
                </select>
              </div>
              <div class="fg">
                <div class="fl">交易類型</div>
                <select id="search-type" style="width:100%;padding:8px;border:0.5px solid var(--bdm);border-radius:var(--rm)">
                  <option value="">全部</option>
                  <option>收入</option>
                  <option>支出</option>
                  <option>轉帳</option>
                </select>
              </div>
            </div>

            <div class="g2">
              <div class="fg">
                <div class="fl">金額範圍</div>
                <input type="number" id="search-amount-from" placeholder="從" style="width:100%;padding:8px;border:0.5px solid var(--bdm);border-radius:var(--rm)">
              </div>
              <div class="fg">
                <div class="fl"></div>
                <input type="number" id="search-amount-to" placeholder="到" style="width:100%;padding:8px;border:0.5px solid var(--bdm);border-radius:var(--rm)">
              </div>
            </div>

            <div class="fg">
              <div class="fl">關鍵字（備註）</div>
              <input type="text" id="search-keyword" placeholder="搜尋備註欄位" style="width:100%;padding:8px;border:0.5px solid var(--bdm);border-radius:var(--rm)">
            </div>

            <div style="display:flex;gap:8px;margin-top:12px">
              <button style="flex:1;padding:10px" onclick="performSearch()">搜尋</button>
              <button style="flex:1;padding:10px;background:none;border:0.5px solid var(--bdm);color:var(--ts)" onclick="resetSearch()">重設</button>
            </div>
          </div>

<script>
const APPS_SCRIPT_URL='https://script.google.com/macros/d/AKfycbxE8NJxFl-CI95FnXH1diGt4iuEVuH08CQ67thiWTlFXggmriows5J7iKl8XRHXL1sn/usercodeapp';
function $(id){return document.getElementById(id);}
function fmt(n){return (Math.round(n*100)/100).toLocaleString('zh-TW',{minimumFractionDigits:0,maximumFractionDigits:0})}
function pct(a,b){return b?(Math.round(a/b*100))+'%':'0%'}

let TX={},CC={},FIXED_ITEMS=[],USERS=['Sherry','Allen'];
let BANKS=[],TRANSACTIONS=[],STOCKS=[],SUBFUNDS=[],SETTINGS=[];
let GUOTAI_TOTAL=0;
let SEARCH_RESULTS=[];
let EDITING_TRANSACTION=null;
let CURRENT_BANK=null;
let CURRENT_MONTH=null;
let SEARCH_MONTH=null;

function showTab(tab){
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.ntab,.btab').forEach(t=>t.classList.remove('on'));
  $(tab)&&$(tab).classList.add('on');
  event?.target?.classList.add('on');
}

function showSearchType(type){
  const banks=$('search-banks');
  const trans=$('search-transactions');
  const btns=document.querySelectorAll('#search .mtl-btn');
  
  if(type==='banks'){
    banks.style.display='block';
    trans.style.display='none';
    btns[0].classList.add('on');
    btns[1].classList.remove('on');
    renderBankTabs();
  }else{
    banks.style.display='none';
    trans.style.display='block';
    btns[0].classList.remove('on');
    btns[1].classList.add('on');
    initSearchTransactions();
  }
}

function renderTabs(){
  const cats=Object.keys(TX).sort();
  $('rec-cat').innerHTML='<option></option>'+cats.map(c=>`<option>${c}</option>`).join('');
  const chans=[...new Set(BANKS.map(b=>b.名稱))];
  $('rec-chan').innerHTML='<option></option>'+chans.map(c=>`<option>${c}</option>`).join('');
}

function renderExpense(){
  const cats=Object.keys(TX).sort();
  $('cat-summary').innerHTML=cats.length?cats.map(c=>{
    const items=TX[c]||[],total=items.reduce((s,t)=>s+t.v,0),color=CC[c]||'#888';
    return `<div class="br" onclick="openModal('${c}')"><div class="brl">${c}</div><div class="brw"><div class="brf" style="background:${color};width:${Math.min(total/50,100)}%"></div></div><div class="bra">NT$${fmt(total)}</div></div>`;
  }).join(''):'<div style="text-align:center;padding:20px;color:var(--tt)">暫無記帳</div>';
  const total=cats.reduce((s,c)=>(TX[c]||[]).reduce((ss,t)=>ss+t.v,0)+s,0);
  $('dash-exp').textContent=fmt(total);
}

function renderTrend(){
  const data=[2500,3200,2800,3100,2900];
  $('weekly-chart').innerHTML='<div style="display:flex;align-items:flex-end;height:100%;gap:8px">'+data.map((v,i)=>`<div style="flex:1;background:var(--accent);border-radius:2px 2px 0 0;height:${v/50}px;position:relative"><div style="position:absolute;bottom:-20px;left:0;right:0;font-size:9px;color:var(--ts);text-align:center">${i+1}週</div></div>`).join('')+'</div>';
}

function openModal(cat){
  const items=TX[cat]||[],total=items.reduce((s,t)=>s+t.v,0),color=CC[cat]||'#888';
  const modal=$('edit-transaction-modal');
  modal.querySelector('.modal-ttl').textContent=cat+' — 每筆明細';
  modal.querySelector('.modal-body').innerHTML=items.length
    ?items.map(t=>`<div class="txr"><div class="txd" style="background:${color}"></div><div class="txi"><div class="txn">${t.n}</div><div class="txdt">${t.d}</div></div><div class="txa">-${fmt(t.v)}</div></div>`).join('')
    :'<div style="font-size:12px;color:var(--tt);padding:12px 0">尚無明細</div>';
}

const COLORS=['#1D9E75','#534AB7','#378ADD','#EF9F27','#D4537E','#888780','#E24B4A','#639922','#D85A30'];
let selColor=COLORS[0];
let channels=[
  {id:1,name:'Sherry 國泰 Cube',owner:'Sherry',color:'#534AB7'},
  {id:2,name:'Allen 玉山卡',owner:'Allen',color:'#1D9E75'},
  {id:3,name:'Allen 現金',owner:'Allen',color:'#888780'},
  {id:4,name:'銀行扣款',owner:'共同',color:'#EF9F27'},
];
let cats=[
  {id:1,name:'食',color:'#1D9E75'},{id:2,name:'育',color:'#534AB7'},{id:3,name:'住',color:'#378ADD'},
  {id:4,name:'行',color:'#EF9F27'},{id:5,name:'衣',color:'#D4537E'},{id:6,name:'樂',color:'#888780'},
  {id:7,name:'醫療',color:'#E24B4A'},{id:8,name:'保費',color:'#639922'},{id:9,name:'其他',color:'#D85A30'},
];
let editingChId=null,nextId=100;

function renderChannels(){
  $('ch-count').textContent=channels.length+' 個';
  $('ch-list').innerHTML=channels.map(ch=>`
    <div class="item-row">
      <div style="width:8px;height:8px;border-radius:50%;background:${ch.color};flex-shrink:0"></div>
      <div class="item-name">${ch.name}</div>
      <div class="item-owner">${ch.owner}</div>
      <div class="item-actions">
        <button class="btn-edit ch-edit-btn" data-id="${ch.id}">修改</button>
        <button class="btn-del ch-del-btn" data-id="${ch.id}">刪除</button>
      </div>
    </div>
  `).join('');
  document.querySelectorAll('.ch-edit-btn').forEach(btn=>btn.addEventListener('click',function(){
    const id=parseInt(this.dataset.id);
    editingChId=id;
  }));
  document.querySelectorAll('.ch-del-btn').forEach(btn=>btn.addEventListener('click',function(){
    if(channels.length<=1){alert('至少保留一個支付管道');return;}
    channels=channels.filter(c=>c.id!==parseInt(this.dataset.id));
    renderChannels();
  }));
}

function renderCats(){
  $('cat-count').textContent=cats.length+' 個';
  $('cat-tags').innerHTML=cats.map(c=>`
    <div class="tag">
      <div style="width:8px;height:8px;border-radius:50%;background:${c.color};flex-shrink:0"></div>
      <span>${c.name}</span>
      <span class="tag-del" data-id="${c.id}">×</span>
    </div>
  `).join('');
  document.querySelectorAll('.tag-del').forEach(btn=>btn.addEventListener('click',function(){
    if(cats.length<=1){alert('至少保留一個費用類別');return;}
    cats=cats.filter(c=>c.id!==parseInt(this.dataset.id));
    renderCats();
  }));
}

function renderColorPick(){
  $('color-pick').innerHTML=COLORS.map(c=>`<div class="cp${c===selColor?' on':''}" style="background:${c}" data-c="${c}"></div>`).join('');
  document.querySelectorAll('.cp').forEach(el=>el.addEventListener('click',function(){selColor=this.dataset.c;renderColorPick();}));
}

$('ch-add-btn').addEventListener('click',async function(){
  const name=$('ch-input').value.trim();if(!name)return;
  const owner=$('ch-owner').value;
  const colorMap={'Sherry':'#98B8D8','Allen':'#1D9E75','共同':'#EF9F27'};
  const color=colorMap[owner]||'#888780';
  channels.push({id:nextId++,name,owner,color});
  $('ch-input').value='';
  renderChannels();
  try{await fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'addChannel',名稱:name,負責人:owner,顏色:color})});}catch(e){console.warn(e);}
});

$('cat-add-btn').addEventListener('click',async function(){
  const name=$('cat-input').value.trim();if(!name)return;
  const color=selColor;
  cats.push({id:nextId++,name,color});
  CC[name]=color;
  $('cat-input').value='';
  renderCats();
  try{await fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'addCat',名稱:name,顏色:color})});}catch(e){console.warn(e);}
});

function renderBankTabs(){
  const tabs=$('bank-tabs');
  tabs.innerHTML=BANKS.map(b=>`
    <button class="bank-tab${CURRENT_BANK===b.名稱?' on':''}" onclick="selectBank('${b.名稱}')">${b.名稱}</button>
  `).join('');
  if(!CURRENT_BANK&&BANKS.length>0){
    selectBank(BANKS[0].名稱);
  }
}

function selectBank(name){
  CURRENT_BANK=name;
  renderBankTabs();
  renderBankDetails();
}

function renderBankDetails(){
  if(!CURRENT_BANK){
    $('bank-initial').textContent='NT$0';
    $('bank-current').textContent='NT$0';
    $('bank-transactions').innerHTML='';
    $('month-income').textContent='+NT$0';
    $('month-expense').textContent='-NT$0';
    $('month-net').textContent='NT$0';
    return;
  }

  const bank=BANKS.find(b=>b.名稱===CURRENT_BANK);
  if(!bank)return;

  $('bank-initial').textContent='NT$'+fmt(bank.期初餘額);
  $('bank-current').textContent='NT$'+fmt(bank.即時餘額);

  // 該帳戶該月的交易
  const year=CURRENT_MONTH.getFullYear();
  const month=CURRENT_MONTH.getMonth()+1;
  const monthTrans=TRANSACTIONS.filter(t=>{
    if(t.支付管道!==CURRENT_BANK)return false;
    const tDate=new Date(t.日期);
    return tDate.getFullYear()===year&&tDate.getMonth()+1===month;
  });

  $('bank-transactions').innerHTML=monthTrans.length?monthTrans.map(t=>{
    const color=t.類型==='收入'?'var(--green)':t.類型==='支出'?'var(--red)':'var(--purple)';
    const sign=t.類型==='支出'?'-':t.類型==='轉帳'?'→':'+';
    return `<div class="txr"><div class="txd" style="background:${color}"></div><div class="txi"><div class="txn">${t.費用類別}</div><div class="txdt">${t.日期} · ${t.記帳人}</div></div><div class="txa" style="color:${color}">${sign}${fmt(t.金額)}</div></div>`;
  }).join(''):'<div style="font-size:12px;color:var(--tt);padding:8px 0">本月無交易</div>';

  const monthIncome=monthTrans.filter(t=>t.類型==='收入').reduce((s,t)=>s+(parseFloat(t.金額)||0),0);
  const monthExpense=monthTrans.filter(t=>t.類型==='支出').reduce((s,t)=>s+(parseFloat(t.金額)||0),0);
  const monthNet=monthIncome-monthExpense;

  $('month-income').textContent='+NT$'+fmt(monthIncome);
  $('month-expense').textContent='-NT$'+fmt(monthExpense);
  $('month-net').textContent=(monthNet>=0?'+':'')+'NT$'+fmt(Math.abs(monthNet));
}

function prevMonth(){
  CURRENT_MONTH=new Date(CURRENT_MONTH.getFullYear(),CURRENT_MONTH.getMonth()-1,1);
  updateMonthDisplay();
  renderBankDetails();
}

function nextMonth(){
  CURRENT_MONTH=new Date(CURRENT_MONTH.getFullYear(),CURRENT_MONTH.getMonth()+1,1);
  updateMonthDisplay();
  renderBankDetails();
}

function updateMonthDisplay(){
  $('current-month').textContent=CURRENT_MONTH.getFullYear()+'年'+(CURRENT_MONTH.getMonth()+1)+'月';
}

function initSearchTransactions(){
  const channels=[...new Set(TRANSACTIONS.map(t=>t.支付管道))];
  const cats=[...new Set(TRANSACTIONS.map(t=>t.費用類別))];
  
  const chSelect=$('search-channel');
  chSelect.innerHTML='<option value="">全部</option>'+channels.map(ch=>`<option>${ch}</option>`).join('');
  
  const catSelect=$('search-category');
  catSelect.innerHTML='<option value="">全部</option>'+cats.map(cat=>`<option>${cat}</option>`).join('');
  
  const today=new Date();
  const monthStart=new Date(today.getFullYear(),today.getMonth(),1);
  $('search-date-from').value=monthStart.toISOString().split('T')[0];
  $('search-date-to').value=today.toISOString().split('T')[0];
}

function performSearch(){
  const dateFrom=$('search-date-from').value;
  const dateTo=$('search-date-to').value;
  const channel=$('search-channel').value;
  const category=$('search-category').value;
  const user=$('search-user').value;
  const amountFrom=parseFloat($('search-amount-from').value)||0;
  const amountTo=parseFloat($('search-amount-to').value)||Infinity;
  const type=$('search-type').value;
  const keyword=($('search-keyword').value||'').toLowerCase();

  SEARCH_RESULTS=TRANSACTIONS.filter(t=>{
    if(dateFrom&&t.日期<dateFrom)return false;
    if(dateTo&&t.日期>dateTo)return false;
    if(channel&&t.支付管道!==channel)return false;
    if(category&&t.費用類別!==category)return false;
    if(user&&t.記帳人!==user)return false;
    const amount=parseFloat(t.金額)||0;
    if(amount<amountFrom||amount>amountTo)return false;
    if(type&&t.類型!==type)return false;
    if(keyword&&!(t.備註||'').toLowerCase().includes(keyword))return false;
    return true;
  });

  displaySearchResults();
}

function displaySearchResults(){
  const resultsDiv=$('search-results');
  const noResultsDiv=$('search-no-results');
  const countDiv=$('search-results-count');
  const bodyDiv=$('search-results-body');

  if(SEARCH_RESULTS.length===0){
    resultsDiv.style.display='none';
    noResultsDiv.style.display='block';
    return;
  }

  resultsDiv.style.display='block';
  noResultsDiv.style.display='none';
  countDiv.textContent=`搜尋結果：${SEARCH_RESULTS.length} 筆`;

  bodyDiv.innerHTML=SEARCH_RESULTS.map((t,idx)=>{
    const typeColor=t.類型==='收入'?'var(--green)':t.類型==='支出'?'var(--red)':'var(--purple)';
    const amountSign=t.類型==='支出'?'-':t.類型==='轉帳'?'→':'+';
    return `<tr style="border-bottom:0.5px solid var(--bd)">
      <td style="padding:8px;color:var(--tp)">${t.日期}</td>
      <td style="padding:8px;color:${typeColor};font-weight:500">${t.類型}</td>
      <td style="padding:8px;color:var(--ts)">${t.記帳人}</td>
      <td style="padding:8px;color:var(--ts)">${t.支付管道}</td>
      <td style="padding:8px;color:var(--ts)">${t.費用類別}</td>
      <td style="padding:8px;text-align:right;color:${typeColor};font-weight:500">${amountSign}${fmt(t.金額)}</td>
      <td style="padding:8px;color:var(--ts);max-width:80px;overflow:hidden;text-overflow:ellipsis">${t.備註||'—'}</td>
      <td style="padding:8px;color:var(--ts)">${t.是否固定==='是'?'✓':'—'}</td>
      <td style="padding:8px;color:var(--ts)">${t.轉帳對象||'—'}</td>
      <td style="padding:8px;text-align:center"><button class="btn-edit" onclick="openEditTransaction(${idx})">編輯</button></td>
    </tr>`;
  }).join('');
}

function openEditTransaction(idx){
  const t=SEARCH_RESULTS[idx];
  EDITING_TRANSACTION={index:idx,data:{...t}};

  const form=$('edit-form');
  form.innerHTML=`
    <div class="fg"><div class="fl">日期</div><input type="date" id="edit-date" value="${t.日期}" style="width:100%;padding:8px;border:0.5px solid var(--bdm);border-radius:var(--rm)"></div>
    <div class="g2">
      <div class="fg"><div class="fl">類型</div><select id="edit-type" style="width:100%;padding:8px;border:0.5px solid var(--bdm);border-radius:var(--rm)"><option ${t.類型==='收入'?'selected':''}>收入</option><option ${t.類型==='支出'?'selected':''}>支出</option><option ${t.類型==='轉帳'?'selected':''}>轉帳</option></select></div>
      <div class="fg"><div class="fl">記帳人</div><select id="edit-user" style="width:100%;padding:8px;border:0.5px solid var(--bdm);border-radius:var(--rm)"><option ${t.記帳人==='Sherry'?'selected':''}>Sherry</option><option ${t.記帳人==='Allen'?'selected':''}>Allen</option></select></div>
    </div>
    <div class="g2">
      <div class="fg"><div class="fl">支付管道</div><select id="edit-channel" style="width:100%;padding:8px;border:0.5px solid var(--bdm);border-radius:var(--rm)">${[...new Set(TRANSACTIONS.map(x=>x.支付管道))].map(ch=>`<option ${t.支付管道===ch?'selected':''}>${ch}</option>`).join('')}</select></div>
      <div class="fg"><div class="fl">費用類別</div><select id="edit-category" style="width:100%;padding:8px;border:0.5px solid var(--bdm);border-radius:var(--rm)">${[...new Set(TRANSACTIONS.map(x=>x.費用類別))].map(cat=>`<option ${t.費用類別===cat?'selected':''}>${cat}</option>`).join('')}</select></div>
    </div>
    <div class="fg"><div class="fl">金額</div><input type="number" id="edit-amount" value="${t.金額}" style="width:100%;padding:8px;border:0.5px solid var(--bdm);border-radius:var(--rm)"></div>
    <div class="fg"><div class="fl">備註</div><input type="text" id="edit-remark" value="${t.備註||''}" style="width:100%;padding:8px;border:0.5px solid var(--bdm);border-radius:var(--rm)"></div>
    <div class="fg"><label style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" id="edit-fixed" ${t.是否固定==='是'?'checked':''} style="cursor:pointer"> 固定支出</label></div>
  `;

  $('save-edit-btn').onclick=saveEditTransaction;
  $('delete-edit-btn').onclick=deleteTransaction;
  $('edit-transaction-modal').classList.add('on');
}

async function saveEditTransaction(){
  if(!EDITING_TRANSACTION)return;
  const newData={
    日期:$('edit-date').value,
    類型:$('edit-type').value,
    記帳人:$('edit-user').value,
    支付管道:$('edit-channel').value,
    費用類別:$('edit-category').value,
    金額:parseFloat($('edit-amount').value),
    備註:$('edit-remark').value,
    是否固定:$('edit-fixed').checked?'是':'否',
    轉帳對象:''
  };
  SEARCH_RESULTS[EDITING_TRANSACTION.index]=newData;
  try{await fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'updateRecord',oldData:EDITING_TRANSACTION.data,newData:newData})});}catch(e){console.warn(e);}
  alert('更新成功');
  $('edit-transaction-modal').classList.remove('on');
  displaySearchResults();
}

async function deleteTransaction(){
  if(!EDITING_TRANSACTION||!confirm('確定要刪除？'))return;
  const t=EDITING_TRANSACTION.data;
  SEARCH_RESULTS.splice(EDITING_TRANSACTION.index,1);
  try{await fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'deleteRecord',date:t.日期,channel:t.支付管道,amount:t.金額})});}catch(e){console.warn(e);}
  alert('刪除成功');
  $('edit-transaction-modal').classList.remove('on');
  displaySearchResults();
}

function resetSearch(){
  $('search-date-from').value='';
  $('search-date-to').value='';
  $('search-channel').value='';
  $('search-category').value='';
  $('search-user').value='';
  $('search-amount-from').value='';
  $('search-amount-to').value='';
  $('search-type').value='';
  $('search-keyword').value='';
  $('search-results').style.display='none';
  $('search-no-results').style.display='none';
  SEARCH_RESULTS=[];
}

async function submitRecord(){
  const date=$('rec-date').value;
  const cat=$('rec-cat').value;
  const chan=$('rec-chan').value;
  const user=$('rec-user').value;
  const amt=parseFloat($('rec-amt').value)||0;
  const desc=$('rec-desc').value;
  const fixed=$('rec-fixed').checked;
  const transfer=$('rec-transfer').checked;
  const tgt=$('rec-tgt').value;

  if(!date||!cat||!chan||amt<=0){alert('請填完整');return;}

  try{
    await fetch(APPS_SCRIPT_URL,{
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        action:'addRecord',
        日期:date,
        類型:'支出',
        記帳人:user,
        支付管道:chan,
        費用類別:cat,
        金額:amt,
        備註:desc,
        是否固定:fixed?'是':'否',
        轉帳對象:tgt
      })
    });
  }catch(e){console.warn(e);}

  alert('記帳成功');
  $('rec-date').value=new Date().toISOString().split('T')[0];
  [$('rec-cat'),$('rec-amt'),$('rec-desc')].forEach(e=>e.value='');
  [$('rec-fixed'),$('rec-transfer')].forEach(e=>e.checked=false);
}

async function loadAllData(){
  try{
    const resp=await fetch(APPS_SCRIPT_URL+'?action=getData');
    const json=await resp.json();
    if(json.success){
      const d=json.data||{};
      TX={};
      BANKS=d.banks||[];
      TRANSACTIONS=d.transactions||[];
      STOCKS=d.stocks||[];
      SUBFUNDS=d.subfunds||[];
      SETTINGS=d.settings||[];
      CC=d.colors||{};
      GUOTAI_TOTAL=d.guotaiTotal||0;
      
      // 組織交易資料
      TRANSACTIONS.forEach(t=>{
        const cat=t.費用類別;
        if(!TX[cat])TX[cat]=[];
        TX[cat].push({n:t.記帳人,d:t.日期,dt:t.支付管道,v:parseFloat(t.金額)||0});
      });

      CURRENT_MONTH=new Date();
      updateMonthDisplay();
      renderTabs();
      renderChannels();
      renderCats();
      renderColorPick();
      renderExpense();
      renderTrend();
      renderBankTabs();
    }
  }catch(e){console.warn('載入失敗',e);}
}

$('rec-transfer').addEventListener('change',function(){
  $('rec-tgt').style.display=this.checked?'inline':'none';
});

const today=new Date();
const todayStr=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
const dateEl=$('rec-date');
if(dateEl)dateEl.value=todayStr;

renderTabs();
renderChannels();
renderCats();
renderColorPick();
loadAllData();
</script>
</body>
</html>
